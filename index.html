<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Tavern Ledger — Commander Match Log</title>
<meta name="description" content="Log Commander games: who won, what they piloted, who sat where.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c1c10">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Lora:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header wood-grain">
  <div class="eyebrow">CACHE TEST — BUILD 4</div>
  <h1 id="header-title">Home</h1>
</header>

<main id="view"></main>

<div id="modal-root"></div>

<nav class="bottom-nav wood-grain">
  <button data-view="home" class="active"><span class="icon">⌂</span>Home</button>
  <button data-view="players"><span class="icon">☺</span>Players</button>
  <button data-view="decks"><span class="icon">◈</span>Decks</button>
  <button data-view="stats"><span class="icon">▤</span>Stats</button>
</nav>

<script src="js/db.js"></script>
<script src="js/scryfall.js"></script>
<script src="js/table.js"></script>
<script src="js/stats.js"></script>
<script src="js/commander-picker.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW registration failed', e));
    });
  }
</script>
</body>
</html>
